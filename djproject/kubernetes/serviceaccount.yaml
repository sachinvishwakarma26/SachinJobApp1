apiVersion: v1
kind: ServiceAccount
metadata:
  name: jobapp-sa
  labels:
    app: jobapp

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jobapp-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jobapp-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jobapp-role
subjects:
  - kind: ServiceAccount
    name: jobapp-sa
