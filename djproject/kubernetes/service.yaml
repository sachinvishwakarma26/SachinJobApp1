apiVersion: v1
kind: Service
metadata:
  name: django-job-app
  namespace: default
  labels:
    app: django-job-app
    version: v1
  annotations:
    description: "Django Job Application Service"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"

spec:
  # Service type
  type: ClusterIP

  # Session affinity for sticky sessions
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

  # Pod selector
  selector:
    app: django-job-app

  # Ports
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
    - name: metrics
      protocol: TCP
      port: 9000
      targetPort: 8000

---
# NodePort Service for development/testing
apiVersion: v1
kind: Service
metadata:
  name: django-job-app-nodeport
  namespace: default
  labels:
    app: django-job-app
    version: v1
    tier: nodeport

spec:
  type: NodePort
  selector:
    app: django-job-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30007
