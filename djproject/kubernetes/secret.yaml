apiVersion: v1
kind: Secret
metadata:
  name: django-secret
  namespace: default
  labels:
    app: django-job-app
type: Opaque
stringData:
  # IMPORTANT: Replace these with your actual values before deploying!
  database-url: "postgresql://user:password@postgres-host:5432/djproject"
  redis-url: "redis://redis-host:6379/0"
  secret-key: "your-django-secret-key-change-this-to-a-random-value"
