apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-job-app
  namespace: default
  labels:
    app: django-job-app
    version: v1
  annotations:
    description: "Django Job Application Deployment"
    author: "Sachin Kumar"

spec:
  # Number of replicas
  replicas: 3

  # Deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Pod selector
  selector:
    matchLabels:
      app: django-job-app

  # Pod template
  template:
    metadata:
      labels:
        app: django-job-app
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"

    spec:
      # Service account
      serviceAccountName: django-app-sa

      # Security context at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Pod Disruption Budget
      affinity:
        # Pod anti-affinity to spread pods across nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - django-job-app
                topologyKey: kubernetes.io/hostname

      # Init container for migrations
      initContainers:
        - name: migrate
          image: sachinkumar26/djproject:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - python /app/manage.py migrate --noinput
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: djproject.settings
            - name: DEBUG
              value: "False"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: database-url
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      # Main container
      containers:
        - name: django-app
          image: sachinkumar26/djproject:latest
          imagePullPolicy: IfNotPresent

          # Port
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Environment variables from ConfigMap and Secret
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: djproject.settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DEBUG
              value: "False"
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: allowed-hosts
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: secret-key
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: log-level

          # Resource requests and limits
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe (for slower apps)
          startupProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30

          # Security context at container level
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
            - name: media-files
              mountPath: /app/media
            - name: tmp
              mountPath: /tmp

      # Volumes
      volumes:
        - name: static-files
          emptyDir: {}
        - name: media-files
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      # Graceful shutdown
      terminationGracePeriodSeconds: 30

      # Image pull secrets (if using private registry)
      # imagePullSecrets:
      #   - name: regcred
