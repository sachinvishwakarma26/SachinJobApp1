stages:
  - test
  - build
  - push
  - deploy

variables:
  DOCKER_IMAGE: sachinkumar26/djproject:1.0
  DOCKER_IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_REGISTRY: docker.io
  DOCKER_TLS_CERTDIR: ""
  FF_USE_FASTZIP: "true"

image: docker:24

services:
  - docker:24-dind

before_script:
  - docker info

# ========================================
# TEST STAGE
# ========================================

# Django Unit Tests with Database
django_tests:
  stage: test
  image: python:3.10-slim
  services:
    - postgres:13
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - pip install --no-cache-dir -r djproject/requirements.txt
    - cd djproject
  script:
    - echo "Running Django migrations..."
    - python manage.py migrate
    - echo "Running Django unit tests..."
    - python manage.py test testapp myapi
    - echo "Running pytest tests..."
    - pytest -v
  artifacts:
    reports:
      junit: djproject/test-results.xml
    expire_in: 30 days
  retry:
    max: 2
  only:
    - merge_requests
    - main
    - develop
    - master

# Code Quality Checks
code_quality:
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install --no-cache-dir flake8 black isort pylint
    - pip install --no-cache-dir -r djproject/requirements.txt
  script:
    - echo "Running code quality checks..."
    - flake8 djproject/testapp djproject/myapi --max-line-length=120 --ignore=E501,W503 || true
    - black --check djproject/testapp djproject/myapi || true
    - isort --check-only djproject/testapp djproject/myapi || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop
    - master

# ========================================
# BUILD STAGE
# ========================================

build_image:
  stage: build
  script:
    - echo "Building Docker image: $DOCKER_IMAGE"
    - docker build --no-cache -t $DOCKER_IMAGE -t $DOCKER_IMAGE:$DOCKER_IMAGE_TAG -f Dockerfile .
    - docker save $DOCKER_IMAGE > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  only:
    - main
    - develop
    - master
    - tags

# ========================================
# PUSH STAGE
# ========================================

push_image:
  stage: push
  dependencies:
    - build_image
  script:
    - echo "Loading Docker image from artifact..."
    - docker load < image.tar
    - echo "Logging in to Docker Hub..."
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD" $DOCKER_REGISTRY
    - echo "Pushing to Docker Hub..."
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE:$DOCKER_IMAGE_TAG
  only:
    - main
    - develop
    - master
    - tags

# ========================================
# DEPLOY STAGE - KUBERNETES
# ========================================

# Development Deployment to Kubernetes
deploy_kubernetes_dev:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to Kubernetes development environment..."
    - kubectl config use-context $KUBE_CONTEXT_DEV
    - kubectl rollout restart deployment djproject-sachin -n default
    - kubectl rollout status deployment/djproject-sachin -n default --timeout=5m
    - kubectl get pods -n default | grep djproject
  environment:
    name: development
    deployment_tier: development
    kubernetes:
      namespace: default
  only:
    - develop
  when: on_success

# Production Deployment to Kubernetes
deploy_kubernetes_prod:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to Kubernetes production environment..."
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - kubectl rollout restart deployment djproject-sachin -n default
    - kubectl rollout status deployment/djproject-sachin -n default --timeout=5m
    - kubectl get pods -n default | grep djproject
  environment:
    name: production
    deployment_tier: production
    kubernetes:
      namespace: default
  only:
    - main
    - master
  when: manual